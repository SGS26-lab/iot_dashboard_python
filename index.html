<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard IoT</title>
</head>
<body>

    <h1>Dashboard IoT Python y Github Pages</h1>

    <h2>Temperatura: <span id="Temperatura">--</span>°C</h2>
    <h2>Humedad: <span id="Humedad">--</span>%</h2>
    <p>Última actualización: <span id="fecha">--</span></p>

<script>
    fetch("datos.json")
        .then(respuesta => respuesta.json())
        .then(datos => {
            // Ajusta los nombres para que coincidan exactamente con datos.json
            document.getElementById("Temperatura").textContent = datos.Temperatura;
            document.getElementById("Humedad").textContent = datos.Humedad;
            document.getElementById("fecha").textContent = datos["fecha:hora"];
        })
        .catch(error => console.error("Error al cargar datos:", error));
</script>

</body>
</html>
